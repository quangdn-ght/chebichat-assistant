services:
  chebichat:
    build:
      context: .
      dockerfile: Dockerfile
    image: giahungtechnology/chebichat-assistant:latest
    container_name: chebichat-assistant
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Persist MCP config across redeployments
      - chebichat_mcp:/app/app/mcp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  chebichat_mcp:
    driver: local
